<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal de Informes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:#001b47;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* â”€â”€ SIDEBAR â”€â”€ */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:200px;background:#001b47;
  display:flex;flex-direction:column;
  z-index:100;border-right:1px solid rgba(255,255,255,0.07);
  transition:transform 0.3s ease;
}
.sidebar-logo{
  padding:16px 14px;border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;
}
.sidebar-logo img{width:150px;}
.sidebar-nav{padding:8px 0;flex:1;}
.nav-label{
  font-size:9px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(255,255,255,0.2);
  padding:12px 16px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;
  color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;
  border-left:3px solid transparent;transition:all 0.2s;
}
.nav-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.85);}
.nav-item.active{background:rgba(232,81,49,0.12);color:#e85131;border-left-color:#e85131;}
.nav-icon{
  width:28px;height:28px;border-radius:6px;
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.nav-item.active .nav-icon{background:#e85131;color:white;}
.sidebar-footer{
  padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);
}
.btn-home{
  width:100%;padding:8px 0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;color:rgba(255,255,255,0.4);
  font-size:10px;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;font-weight:600;transition:all 0.2s;
}
.btn-home:hover{background:rgba(255,255,255,0.1);color:white;}

/* â”€â”€ MAIN CONTENT â”€â”€ */
.main{
  margin-left:200px;
  height:100vh;
  position:relative;
}

/* â”€â”€ VIEWS â”€â”€ */
.view{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
.view.active{opacity:1;pointer-events:all;}

/* â”€â”€ LANDING (sin sidebar visible, fullscreen) â”€â”€ */
#view-landing{margin-left:-200px;width:calc(100% + 200px);}

/* â”€â”€ IFRAME â”€â”€ */
iframe{
  width:100%;height:100%;
  border:none;display:block;
}

/* â”€â”€ LANDING OVERLAY para los botones â”€â”€ */
.landing-overlay{
  position:absolute;bottom:0;left:0;right:0;
  height:160px;
  background:linear-gradient(to bottom, rgba(2,8,24,0) 0%, rgba(2,8,24,0.97) 100%);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:36px;
  pointer-events:none;
  z-index:10;
}
.landing-buttons{display:flex;gap:18px;pointer-events:all;}
.ucl-btn{
  width:190px;padding:12px 0;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;background:rgba(255,255,255,0.05);
  color:white;font-size:13px;font-weight:600;letter-spacing:0.8px;
  cursor:pointer;transition:all 0.3s ease;
  border:1px solid rgba(255,255,255,0.07);
}
.ucl-btn:hover{
  background:rgba(235,232,214,0.15);
  border-color:rgba(235,232,214,0.5);
  transform:translateY(-2px);color:#ebe8d6;
  box-shadow:0 4px 15px rgba(235,232,214,0.1);
}
</style>
</head>

<script>
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  let currentView = 'landing';

  function showView(name) {
    // Ocultar view actual
    document.getElementById('view-' + currentView).classList.remove('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

    // Mostrar/ocultar sidebar segÃºn si es landing o no
    if(name === 'landing') {
      sidebar.style.display = 'none';
      main.style.marginLeft = '0';
      document.getElementById('view-landing').style.width = '100%';
    } else {
      sidebar.style.display = 'flex';
      main.style.marginLeft = '200px';
      document.getElementById('view-landing').style.width = '';
      // Activar nav item
      const navEl = document.getElementById('nav-' + name);
      if(navEl) navEl.classList.add('active');
    }

    // Lazy load iframe si no cargÃ³ todavÃ­a
    const iframe = document.getElementById('iframe-' + name);
    if(iframe && !iframe.src && iframe.dataset.src) {
      iframe.src = iframe.dataset.src;
    }

    // Mostrar nuevo view
    document.getElementById('view-' + name).classList.add('active');
    currentView = name;
  }

  // Iniciar con sidebar oculto (landing)
  sidebar.style.display = 'none';
  main.style.marginLeft = '0';
</script>
